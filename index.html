<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bellavista - Luxury Rooms & Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark: #1a1a1a;
            --light: #fdfcf9;
            --white: #ffffff;
            --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            background-color: var(--light);
            color: var(--dark);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* --- STICKY HEADER --- */
        header.nav-bar {
            position: fixed;
            top: 0; width: 100%;
            padding: 30px 50px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
            transition: var(--transition);
            color: white;
        }

        header.nav-bar.scrolled {
            padding: 15px 50px;
            background: var(--white);
            color: var(--dark);
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }

        .logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; letter-spacing: 4px; font-weight: bold; }
        nav a { color: inherit; text-decoration: none; margin-left: 30px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; }

        /* --- HERO --- */
        .hero {
            height: 70vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
            display: flex; align-items: center; justify-content: center; color: white; text-align: center;
        }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 5vw, 4rem); margin: 0; letter-spacing: 5px; }

        /* --- ROOMS --- */
        .container { max-width: 1200px; margin: -60px auto 100px; padding: 0 20px; position: relative; z-index: 10; }
        .rooms-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; }
        .room-card { background: var(--white); overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.05); transition: var(--transition); }
        .img-container { height: 350px; overflow: hidden; cursor: zoom-in; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .room-card:hover .img-container img { transform: scale(1.05); }
        .room-content { padding: 30px; }
        .price-btn-row { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; }
        
        .btn {
            background: var(--dark); color: white; padding: 12px 28px; border: none;
            text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px; cursor: pointer; transition: 0.3s;
        }
        .btn:hover { background: var(--gold); }

        /* --- DRAWER (ФОРМА БРОНИРОВАНИЯ) --- */
        #bookingDrawer {
            position: fixed; top: 0; right: -450px; width: 450px; height: 100%;
            background: var(--white); z-index: 3000; transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            padding: 60px 40px; box-shadow: -10px 0 30px rgba(0,0,0,0.1);
        }
        #bookingDrawer.open { right: 0; }
        
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 2500; display: none; opacity: 0; transition: 0.3s;
        }
        #overlay.active { display: block; opacity: 1; }

        .drawer-close { position: absolute; top: 20px; left: 20px; cursor: pointer; font-size: 1.5rem; }
        
        .booking-form h2 { font-family: 'Playfair Display', serif; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.7rem; text-transform: uppercase; color: var(--gray); margin-bottom: 8px; }
        .form-group input, .form-group select {
            width: 100%; padding: 12px; border: 1px solid #ddd; font-family: inherit; outline: none;
        }

        /* --- LIGHTBOX --- */
        #lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 4000;
        }
        #lightbox img { max-width: 85%; max-height: 80%; }

        @media (max-width: 500px) {
            #bookingDrawer { width: 100%; right: -100%; }
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="closeDrawer()"></div>

    <header class="nav-bar" id="navbar">
        <div class="logo">BELLAVISTA</div>
        <nav>
            <a href="#">Rooms</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-text">
            <h1>BELLAVISTA</h1>
            <p>Ваш личный рай на побережье</p>
        </div>
    </section>

    <div class="container">
        <div class="rooms-grid">
            <div class="room-card">
                <div class="img-container" onclick="openLightbox(this)">
                    <img src="https://images.unsplash.com/photo-1590490360182-c33d57733427?auto=format&fit=crop&w=800&q=80" alt="Ocean Suite">
                </div>
                <div class="room-content">
                    <h3>Ocean Front Suite</h3>
                    <p>Просторная терраса и шум волн в подарок к каждому утру.</p>
                    <div class="price-btn-row">
                        <span>€450 / Ночь</span>
                        <button class="btn" onclick="openDrawer('Ocean Front Suite')">Book Now</button>
                    </div>
                </div>
            </div>

            <div class="room-card">
                <div class="img-container" onclick="openLightbox(this)">
                    <img src="https://images.unsplash.com/photo-1566665797739-1674de7a421a?auto=format&fit=crop&w=800&q=80" alt="Garden Room">
                </div>
                <div class="room-content">
                    <h3>Garden Villa</h3>
                    <p>Уединение среди тропической зелени и персональный сервис.</p>
                    <div class="price-btn-row">
                        <span>€280 / Ночь</span>
                        <button class="btn" onclick="openDrawer('Garden Villa')">Book Now</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="bookingDrawer">
        <span class="drawer-close" onclick="closeDrawer()">✕</span>
        <div class="booking-form">
            <h2>Бронирование</h2>
            <p id="selectedRoomText" style="color: var(--gold); margin-bottom: 20px;"></p>
            <div class="form-group">
                <label>Дата заезда</label>
                <input type="date">
            </div>
            <div class="form-group">
                <label>Дата выезда</label>
                <input type="date">
            </div>
            <div class="form-group">
                <label>Количество гостей</label>
                <select>
                    <option>1 Взрослый</option>
                    <option selected>2 Взрослых</option>
                    <option>Семья (2+1)</option>
                </select>
            </div>
            <button class="btn" style="width: 100%; margin-top: 20px;" onclick="alert('Запрос отправлен! Мы свяжемся с вами.')">Проверить наличие</button>
        </div>
    </div>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" src="">
    </div>

    <script>
        // 1. Скролл навигации
        window.onscroll = function() {
            const nav = document.getElementById('navbar');
            if (window.pageYOffset > 50) nav.classList.add('scrolled');
            else nav.classList.remove('scrolled');
        };

        // 2. Управление Drawer (Формой)
        function openDrawer(roomName) {
            document.getElementById('selectedRoomText').innerText = "Выбранный номер: " + roomName;
            document.getElementById('bookingDrawer').classList.add('open');
            const overlay = document.getElementById('overlay');
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden'; // Запрет скролла
        }

        function closeDrawer() {
            document.getElementById('bookingDrawer').classList.remove('open');
            document.getElementById('overlay').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // 3. Лайтбокс
        function openLightbox(el) {
            const box = document.getElementById('lightbox');
            document.getElementById('lightbox-img').src = el.querySelector('img').src;
            box.style.display = 'flex';
        }
    </script>
</body>
</html>
