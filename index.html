<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bellavista - Luxury Rooms</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark: #1a1a1a;
            --light: #fdfcf9;
            --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            background-color: var(--light);
            color: var(--dark);
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        /* --- STICKY HEADER --- */
        header.nav-bar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            transition: var(--transition);
            color: white;
        }

        /* Стиль при скролле */
        header.nav-bar.scrolled {
            padding: 15px 50px;
            background: white;
            color: var(--dark);
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            letter-spacing: 4px;
            font-weight: bold;
        }

        nav a {
            color: inherit;
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        nav a:hover { color: var(--gold); }

        /* --- HERO SECTION --- */
        .hero {
            height: 80vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        .hero-text h1 { font-family: 'Playfair Display', serif; font-size: 4rem; margin: 0; letter-spacing: 5px; }

        /* --- ROOMS GRID --- */
        .container { max-width: 1200px; margin: -60px auto 100px; padding: 0 20px; position: relative; z-index: 10; }
        
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        .room-card {
            background: white;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            transition: var(--transition);
        }

        .img-container { height: 350px; overflow: hidden; cursor: pointer; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .room-card:hover .img-container img { transform: scale(1.1); }

        .room-content { padding: 30px; }
        .room-content h3 { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin: 0 0 10px; }
        
        .price-btn-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .btn {
            background: var(--dark);
            color: white;
            padding: 12px 28px;
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        .btn:hover { background: var(--gold); }

        /* --- LIGHTBOX --- */
        #lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; align-items: center;
            justify-content: center; z-index: 2000; cursor: pointer;
        }
        #lightbox img { max-width: 90%; max-height: 80%; transform: scale(0.9); transition: 0.4s; }
        #lightbox.active img { transform: scale(1); }

        /* Mobile */
        @media (max-width: 768px) {
            header.nav-bar { padding: 20px; }
            nav { display: none; }
            .hero-text h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <header class="nav-bar" id="navbar">
        <div class="logo">BELLAVISTA</div>
        <nav>
            <a href="#">Главная</a>
            <a href="#">Номера</a>
            <a href="#">Сервис</a>
            <a href="#">Контакты</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-text">
            <h1>LUXURY STAY</h1>
            <p>Гармония комфорта и природы</p>
        </div>
    </section>

    <div class="container">
        <div class="rooms-grid">
            <div class="room-card">
                <div class="img-container" onclick="openLightbox(this)">
                    <img src="https://images.unsplash.com/photo-1578683010236-d716f9a3f461?auto=format&fit=crop&w=800&q=80" alt="Suite">
                </div>
                <div class="room-content">
                    <h3>Panorama Suite</h3>
                    <p>Лучший вид на закат из вашего личного джакузи.</p>
                    <div class="price-btn-row">
                        <span>€320 / Ночь</span>
                        <a href="#" class="btn">Book Now</a>
                    </div>
                </div>
            </div>
            
            <div class="room-card">
                <div class="img-container" onclick="openLightbox(this)">
                    <img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?auto=format&fit=crop&w=800&q=80" alt="Deluxe">
                </div>
                <div class="room-content">
                    <h3>Classic Deluxe</h3>
                    <p>Идеальный баланс классики и современных технологий.</p>
                    <div class="price-btn-row">
                        <span>€195 / Ночь</span>
                        <a href="#" class="btn">Book Now</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="">
    </div>

    <script>
        // 1. Изменение шапки при скролле
        window.onscroll = function() {
            const nav = document.getElementById('navbar');
            if (window.pageYOffset > 50) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        };

        // 2. Логика лайтбокса
        function openLightbox(el) {
            const box = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = el.querySelector('img').src;
            box.style.display = 'flex';
            setTimeout(() => box.classList.add('active'), 10);
        }

        function closeLightbox() {
            const box = document.getElementById('lightbox');
            box.classList.remove('active');
            setTimeout(() => box.style.display = 'none', 300);
        }
    </script>
</body>
</html>
